[pytest]
# Thư mục chứa test
testpaths = tests

# Markers tùy chỉnh
markers =
    smoke: test case quan trọng nhất, chạy nhanh
    visual: test case tập trung vào visual testing
    e2e: end-to-end flow tests
    mobile: test trên thiết bị mobile
    regression: test regression đầy đủ

# Hiển thị chi tiết khi chạy
addopts =
    -v
    --tb=short
    --strict-markers

# Timeout mặc định cho mỗi test (giây)
timeout = 60
