name: Next-Gen UI Automation Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest playwright pytest-playwright percy-playwright allure-pytest
        python -m playwright install --with-deps chromium
        npm install -g @percy/cli

    - name: Run Tests with Percy Visual AI
      env:
        PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
      run: npx @percy/cli exec -- pytest tests/
