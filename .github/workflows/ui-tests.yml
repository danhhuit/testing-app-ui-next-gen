name: Next-Gen UI Automation Pipeline

on:
  push:
    branches: [ main ] # Tự động chạy khi có code mới đẩy lên nhánh main

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest # Máy chủ ảo Linux của GitHub

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest playwright pytest-playwright percy-playwright allure-pytest
        python -m playwright install --with-deps chromium

    - name: Run Tests with Percy Visual AI
      env:
        PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }} # Bảo mật Token của bạn
      run: npx percy exec -- pytest tests/ --headed